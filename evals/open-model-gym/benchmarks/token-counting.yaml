name: "Token Counting Accuracy"
description: "Validates token counting across different models and providers"

config:
  iterations: 5
  providers:
    - "anthropic"
    - "openai"

tests:
  - name: "simple_text"
    text: "Hello, world!"
    expected_range: [2, 5]

  - name: "code_snippet"
    text: "def fib(n):\n    if n <= 1:\n        return n\n    return fib(n-1) + fib(n-2)"
    expected_range: [20, 40]

  - name: "multilingual"
    text: "Hello 你好 Bonjour Hallo こんにちは"
    expected_range: [5, 15]
