title: "❓ Question: [Brief summary]"
labels:
  - help
body:
  - type: markdown
    attributes:
      value: |
        💡 Before posting, please attach your **diagnostics zip** — it helps the Rook team debug faster and saves everyone time.  
        [How to capture and share diagnostics](https://github.com/ShaileshRawat1403/rook/blob/main/docs/development.md)
  - type: textarea
    id: problem
    attributes:
      label: What happened?
      description: Describe the issue in detail and attach your diagnostics zip if possible.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Tell us how to reproduce the issue — commands, steps, or context.
  - type: textarea
    id: version
    attributes:
      label: Rook version and environment
      description: Include your Rook version and operating system if known.
